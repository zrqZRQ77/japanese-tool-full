<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17242d">
  <title>选择电车路线｜Yomeru</title>
  <meta name="description" content="选择一条东京电车路线，用日语输入站名，把列车开到终点。">
  <link rel="stylesheet" href="/challenge/train/train-hub.css">
</head>
<body>
  <a class="skip-link" href="#routeMain">跳到路线列表</a>
  <header class="hub-header">
    <a class="hub-brand" href="/"><img src="/assets/brand/yomeru-mark.svg" alt="" width="36" height="36">Yomeru</a>
    <a class="hub-back" href="/">返回阅读工具</a>
  </header>

  <main id="routeMain" class="hub-shell">
    <section class="hub-hero" aria-labelledby="hubTitle">
      <div class="hub-hero-copy">
        <p class="hub-eyebrow">YOMERU TRAIN TYPING</p>
        <h1 id="hubTitle">选择一条路线，<br>用日语开到终点。</h1>
      </div>
      <div class="hub-network" aria-label="新宿到上野的山手线短程原创简化示意图">
        <span class="hub-network-node node-start">新宿</span>
        <svg class="hub-network-route" viewBox="0 0 600 120" aria-hidden="true" focusable="false">
          <path d="M108 64 C220 46 380 46 492 64"></path>
          <circle class="is-endpoint" cx="108" cy="64" r="9"></circle>
          <circle cx="174" cy="55" r="7"></circle>
          <circle cx="238" cy="50" r="7"></circle>
          <circle cx="300" cy="48" r="7"></circle>
          <circle cx="362" cy="50" r="7"></circle>
          <circle cx="426" cy="55" r="7"></circle>
          <circle class="is-endpoint" cx="492" cy="64" r="9"></circle>
        </svg>
        <span class="hub-network-node node-end">上野</span>
        <img src="/challenge/train/assets/train.svg" alt="原创列车图标" width="58" height="58">
      </div>
    </section>

    <section class="hub-summary" aria-label="挑战概览">
      <div><span>开放路线</span><strong id="routeCount">3</strong></div>
      <div><span>累计挑战</span><strong id="totalChallenges">0</strong></div>
      <div><span>已完成路线</span><strong id="completedRoutes">0 / 3</strong></div>
    </section>

    <section class="route-section" aria-labelledby="routeSectionTitle">
      <div class="route-section-heading">
        <div>
          <p class="hub-eyebrow">ROUTE BOARD</p>
          <h2 id="routeSectionTitle">选择挑战路线</h2>
        </div>
        <p>第一条适合熟悉玩法，后两条用来练习不同站名。</p>
      </div>
      <div id="routeGrid" class="route-grid" aria-live="polite">
        <p class="route-loading">路线载入中…</p>
      </div>
      <p id="hubError" class="hub-error" role="alert" hidden>路线数据载入失败，请刷新页面重试。</p>
    </section>
  </main>

  <footer class="hub-footer">
    <span>站名与顺序依据运营机构公开资料核验</span>
    <span>Yomeru 原创学习活动 · 非铁路运营机构官方产品</span>
  </footer>
  <script src="/challenge/train/train-shared.js"></script>
  <script src="/challenge/train/train-hub.js"></script>
</body>
</html>
